<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>for문</title>
  </head>
  <body>
    <script>
      const color = ["red", "green", "blue", "pink"];
      let text = "";

      for (let i = 0; i <= 3; i++) {
        text += `<span style='color: ${color[i]}'>안녕</span><br>`;
      }
      document.write(text);
    </script>
  </body>
</html>
