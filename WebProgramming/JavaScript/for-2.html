<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>for02</title>
</head>
<body>
  <script>
    const num = prompt("숫자를 입력하세요");
    let odd = 0;
    let even = 0;
    for (let i = 1; i <= num; i++ ) {
      if (i % 2 === 0) {
        even += i;
      } else {
        odd += i;
      }
    }
    document.write(`짝수 합계: ${even}<br>`);
    document.write(`홀수 합계: ${odd}`);

  </script>
</body>
</html>
