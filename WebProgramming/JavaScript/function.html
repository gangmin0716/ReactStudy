<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <script>
      function getArea(width, height) {
        return width * height;
      }

      document.write(`사각형의 넓이: ${getArea(10, 5)}`);

      const getArea2 = function(width, height) {
        return width * height;
      }

      document.write(`<br>사각형의 넓이: ${getArea2(10, 5)}`);
    </script>
  </body>
</html>
