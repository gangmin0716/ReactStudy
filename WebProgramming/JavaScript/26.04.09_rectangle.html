<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<script>
  class Square {
    #length;

    constructor(length) {
      this.#length = length;
      this._length = length;
    }


    set length(value) {
      if (value <= 0) throw '오류';
      this.#length = value;
    }

    get length() {
      return this.#length;
    }
    getPerimeter() {return 4 * this.#length;}
    getArea() {return this.#length ** 2;}
  }

  const square = new Square(10);
  console.log(`정사각형의 둘레: ${square.getPerimeter()}`);
  console.log(`정사각형의 넓이: ${square.getArea()}`);

  console.log(square.length);
  square.length = -10;
  console.log(`정사각형의 둘레: ${square.getPerimeter()}`);
  console.log(`정사각형의 넓이: ${square.getArea()}`);
</script>
</body>
</html>
