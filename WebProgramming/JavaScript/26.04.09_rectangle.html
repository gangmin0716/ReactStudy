<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<script>
  class Rectangle {

    constructor(width, height) {
      this.width = width;
      this.height = height;
    }

    getPerimeter() {
      return 2 * (this.width + this.height);
    }

    getArea() {
      return this.height * this.width;
    }

  }

  const rectangle = new Rectangle(10, 20);

  console.log(`사각형의 둘레: ${rectangle.getPerimeter()}`);
  console.log(`사각형의 넓이: ${rectangle.getArea()}`);
</script>
</body>
</html>
