<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const imgs = document.querySelectorAll('img');
      imgs.forEach((img) => {
        img.addEventListener('contextmenu', (event) => {
          event.preventDefault();
        })
      })
    })
  </script>
</head>
<body>
  <img src="https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?auto=format&fit=crop&q=80&w=500" alt="닭">
</body>
</html>
