<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>for03</title>
</head>
<body>
  <script>
    const num = prompt("몇 단을 출력할까요?");

    for (let i = 2; i <= num; i++){
      for (let j = 1; j <= 9; j++) {
        document.write(`${i} x ${j} = ${i * j}<br>`);
      }
      document.write("<br>");
    }
  </script>
</body>
</html>
